<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="icon" href="data:image/svg+xml,
        <svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
        <text y=%22.9em%22 font-size=%2290%22>🎂</text>
        </svg>">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #d63031;
            --dark-red: #8b0000;
            --yellow-btn: #ffd700;
            --skin-tone: #f7e1d7;
            --coffee-paper: #f3e5ab;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            background-color: var(--primary-red);
        }

        /* Fixed Entry Screen Overlay */
        #entry-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-red);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .enter-btn {
            background-color: var(--yellow-btn);
            color: #333;
            border: none;
            padding: 15px 50px;
            font-size: 1.6rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            font-family: 'Quicksand', sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .enter-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        /* Base page layout container styling */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background-size: cover;
            background-position: center;
            box-sizing: border-box;
            overflow-y: auto;
        }

        #page1.active { 
            display: flex; 
            background-color: var(--primary-red); 
            color: white; 
            flex-direction: row; 
            flex-wrap: wrap;
            padding: 20px;
        }
        #page2.active { display: flex; background-color: var(--skin-tone); color: #444; text-align: center; }
        #page3.active { display: flex; background-color: #0B1026; color: white; text-align: center; overflow: hidden; }
        
        .left-content { width: 50%; display: flex; flex-direction: column; align-items: center; text-align: center; padding: 20px; z-index: 20; box-sizing: border-box; min-width: 280px; }
        .right-content { width: 50%; display: flex; justify-content: center; align-items: center; position: relative; z-index: 20; box-sizing: border-box; min-width: 280px; }

        @media (max-width: 600px) {
            .left-content, .right-content { width: 100%; }
            #page1.active { flex-direction: column; justify-content: center; }
        }

        .photo-frame {
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transform: rotate(5deg);
            position: relative;
        }

        .photo-frame img {
            width: 250px;
            height: 300px;
            object-fit: cover;
        }

        .frame-text {
            color: #333;
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            margin-top: 10px;
            text-align: center;
        }

        .coquette-bow {
            position: absolute;
            left: -25px;
            top: -25px;
            font-size: 40px;
            z-index: 30;
        }

        .options-btn {
            background: white;
            color: var(--primary-red);
            border: none;
            padding: 10px 25px;
            margin: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
            position: relative;
            z-index: 30;
        }

        .options-btn:hover { transform: scale(1.1); }
        
        .coffee-letter {
            background-color: var(--coffee-paper);
            padding: 30px;
            width: 70%;
            max-width: 500px;
            border-radius: 5px;
            box-shadow: inset 0 0 50px rgba(139, 69, 19, 0.2), 5px 5px 15px rgba(0,0,0,0.1);
            font-family: 'Dancing Script', cursive;
            font-size: 1.3rem;
            line-height: 1.6;
            margin-top: 20px;
            display: none;
            text-align: left;
            position: relative;
            z-index: 30;
        }

        .envelope {
            width: 150px;
            height: 100px;
            background: #e17055;
            position: relative;
            cursor: pointer;
            margin: 20px auto;
            z-index: 30;
        }
        
        .cake { font-size: 140px; margin-bottom: 20px; position: relative; z-index: 10; }
        #wish-text { font-size: 1.5rem; position: relative; z-index: 10; margin-bottom: 10px; }
        .countdown { font-size: 60px; font-weight: bold; position: relative; z-index: 10; }

        .messenger-pop {
            position: fixed;
            background: var(--skin-tone);
            color: #333;
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: popUp 2s forwards;
            z-index: 50;
            max-width: 200px;
        }

        @keyframes popUp {
            0% { opacity: 0; transform: translateY(20px) scale(0.8); }
            10% { opacity: 1; transform: translateY(0) scale(1); }
            90% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            pointer-events: none; 
            z-index: 1; 
            width: 100%; 
            height: 100%; 
        }
        
        .next-btn {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background: #444;
            color: white;
            cursor: pointer;
            display: block;
            margin-left: auto;
            margin-right: auto;
            position: relative;
            z-index: 40;
        }

        .falling-flower {
            position: absolute;
            font-size: 45px;
            z-index: 8;
            pointer-events: none;
            user-select: none;
            top: -60px;
        }

        @keyframes throwFromLeft {
            0% { 
                transform: translate(0px, 0px) rotate(0deg); 
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% { 
                transform: translate(var(--target-x), var(--ground-y)) rotate(var(--rand-rot)); 
            }
        }

        @keyframes throwFromRight {
            0% { 
                transform: translate(0px, 0px) rotate(0deg); 
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% { 
                transform: translate(calc(-1 * var(--target-x)), var(--ground-y)) rotate(var(--rand-rot)); 
            }
        }
    </style>
</head>
<body>

    <div id="entry-screen">
        <h2 style="font-family: 'Dancing Script', cursive; font-size: 3.5rem; margin-bottom: 30px; letter-spacing: 2px;">I have something special for you 🎀</h2>
        <button class="enter-btn" onclick="startEverything()"><i>Click me</i></button>
    </div>

    <audio id="bgMusic" preload="auto">
        <source src="https://files.catbox.moe/5lxvdf.mp3" type="audio/mpeg">
    </audio>

    <div id="page1" class="page active">
        <div class="left-content">
            <h2>Choose an Option</h2>
            <button class="options-btn" onclick="goToPage2()">Option A</button>
            <button class="options-btn" onclick="goToPage2()">Option B</button>
        </div>
        <div class="right-content">
            <div class="photo-frame">
                <div class="coquette-bow">🎀</div>
                <img src="https://images.unsplash.com/photo-1513885535751-8b9238bd345a?q=80&w=800&auto=format&fit=crop&utm_source=chatgpt.com" alt="Rosemary">
                <div class="frame-text">Happy Birthday</div>
            </div>
        </div>
    </div>

    <div id="page2" class="page">
        <div style="position: relative; z-index: 30;">
            <h2 id="date-text" style="font-family: 'Dancing Script'; font-size: 3rem; margin-bottom: 5px;">11th September, 2005</h2>
            <p id="sub-text" style="font-size: 1.2rem; margin-top: 0;">The day when the world changed and became beautiful</p>
            
            <div class="envelope" id="envelope" onclick="openLetter()">
                <div style="text-align:center; padding-top: 35px; color: white; font-weight: bold;">Click Me</div>
            </div>

            <div class="coffee-letter" id="letter">
                <h3 style="text-align: center; font-size: 1.8rem; margin-top: 0;">Happy Birthdayyyyyyyy .....</h3>
                <h4>Life feels lighter with you in it,</h4>
                <h4>and I am so lucky I have you.</h4>
                <button class="next-btn" onclick="goToPage3()">Next</button>
            </div>
        </div>
        <canvas id="fireworks1"></canvas>
    </div>

    <div id="page3" class="page">
        <div class="cake">🎂</div>
        <div id="wish-text">Make a wish</div>
        <div class="countdown" id="timer">10</div>
        <canvas id="fireworks2"></canvas>
    </div>

    <script>
        const music = document.getElementById('bgMusic');

        music.onended = function() {
            try {
                music.currentTime = 20;
                music.play().catch(e => console.log("Audio loop deferred:", e));
            } catch(err) { console.log(err); }
        };

        function startEverything() {
            const entryScreen = document.getElementById('entry-screen');
            
            entryScreen.style.pointerEvents = 'none';
            entryScreen.style.opacity = '0';
            
            setTimeout(() => {
                entryScreen.style.display = 'none';
            }, 500);

            try {
                music.currentTime = 20;
                var playPromise = music.play();
                if (playPromise !== undefined) {
                    playPromise.catch(e => console.log("Audio presentation deferred:", e));
                }
            } catch(err) {
                console.log("Audio setup skipped safely:", err);
            }
        }

        function goToPage2() {
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
            startFireworks('fireworks1', 4000);
        }

        function openLetter() {
            document.getElementById('envelope').style.display = 'none';
            document.getElementById('letter').style.display = 'block';
        }

        function goToPage3() {
            document.getElementById('page2').classList.remove('active');
            document.getElementById('page3').classList.add('active');
            startCountdown();
        }

        function startCountdown() {
            let count = 10;
            const timerDisplay = document.getElementById('timer');
            const messages = ["happy birthday ", "happy birthday to you", "happy birthday"];

            const spawnInterval = setInterval(() => {
                if (count > 0) {
                    spawnMessage(messages[Math.floor(Math.random() * messages.length)], 'left');
                    spawnMessage(messages[Math.floor(Math.random() * messages.length)], 'right');
                }
            }, 350);

            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    timerDisplay.innerText = count;
                } else {
                    clearInterval(interval);
                    clearInterval(spawnInterval);
                    timerDisplay.style.display = 'none';
                    finishCelebration();
                }
            }, 1000);
        }

        function spawnMessage(text, side) {
            const msg = document.createElement('div');
            msg.className = 'messenger-pop';
            msg.innerText = text;
            
            let targetX;
            if (side === 'left') {
                targetX = Math.random() * 25 + 5; 
            } else {
                targetX = Math.random() * 25 + 65;
            }
            
            msg.style.left = targetX + '%';
            msg.style.top = Math.random() * 75 + 10 + '%';
            document.getElementById('page3').appendChild(msg);
        }

        function finishCelebration() {
            const page3 = document.getElementById('page3');
            
            page3.style.backgroundImage = "none";
            page3.style.backgroundColor = "#6f4e37"; 
            page3.style.color = '#ffffff'; 
            
            document.getElementById('wish-text').style.display = 'none';
            startFlowerShower();
            // Passing 0 keeps the fireworks running forever alongside the flowers
            startFireworks('fireworks2', 0);
        }

        function startFlowerShower() {
            const flowerEmojis = ['🌼', '🌸', '🏵️', '💐', '💮'];
            const page3 = document.getElementById('page3');

            setInterval(() => {
                const flower = document.createElement('div');
                flower.className = 'falling-flower';
                flower.innerText = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
                
                const fromLeft = Math.random() > 0.5;
                
                if (fromLeft) {
                    flower.style.left = '0vw';
                    flower.style.animationName = 'throwFromLeft';
                } else {
                    flower.style.right = '0vw';
                    flower.style.animationName = 'throwFromRight';
                }
                
                const duration = 6; 
                const targetX = Math.random() * 100 + 'vw';
                const groundY = (window.innerHeight - (Math.random() * 80 + 80)) + 'px'; 
                const randRot = Math.random() * 360 + 'deg';

                flower.style.setProperty('--target-x', targetX);
                flower.style.setProperty('--ground-y', groundY);
                flower.style.setProperty('--rand-rot', randRot);
                flower.style.animationDuration = duration + 's';
                flower.style.animationTimingFunction = 'ease-out';
                flower.style.animationFillMode = 'forwards';
                
                page3.appendChild(flower);

                setTimeout(() => {
                    flower.remove();
                }, 45000);
            }, 200);
        }

        function startFireworks(canvasId, duration) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            const resizeCanvas = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            let particles = [];
            const colors = ['#ffffff', '#ffeb3b', '#ff4081', '#00e676', '#e17055'];

            function createParticle() {
                return {
                    x: Math.random() * canvas.width,
                    y: canvas.height,
                    vx: Math.random() * 6 - 3,
                    vy: Math.random() * -12 - 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 120
                };
            }

            let activeAnimation = true;
            function animate() {
                if (!activeAnimation) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (particles.length < 60) particles.push(createParticle());
                
                particles.forEach((p, i) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.12; 
                    p.life--;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    if (p.life <= 0) particles.splice(i, 1);
                });
                requestAnimationFrame(animate);
            }
            animate();

            if (duration > 0) {
                setTimeout(() => { 
                    activeAnimation = false;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }, duration);
            }
        }
    </script>
</body>
</html>
